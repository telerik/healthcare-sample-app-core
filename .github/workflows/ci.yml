# Builds and tests the application
name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    concurrency:
      group: 'cd-${{ github.ref }}'
      cancel-in-progress: false

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Clone repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 10.x

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x

      - name: Setup Telerik Nuget Feed
        run: |
          dotnet nuget add source https://nuget.telerik.com/v3/index.json \
          --name telerik.com \
          --username api-key \
          --password "%TELERIK_NUGET_FEED_API_KEY%" \
          --store-password-in-clear-text

      - name: Build App
        run: dotnet build HealthcareApp.csproj -c release
        env:
          KENDO_UI_LICENSE: ${{ secrets.KENDO_UI_LICENSE }}
          TELERIK_NUGET_FEED_API_KEY: ${{ secrets.TELERIK_NUGET_FEED_API_KEY }}

      - name: Run tests
        working-directory: ./tests
        timeout-minutes: 10
        continue-on-error: true # TODO: Fix tests before merging
        env:
          BROWSER_NAME: chrome
          HEADLESS: true
        run: |
          dotnet run --project ../HealthcareApp.csproj --launch-profile https &
          npm ci
          npm test
